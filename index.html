<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My ToDo App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>TODO List</h1>
        <p style="color: grey;">Add, edit, and delete tasks.</p>

        <div class="input-group">
            <input type="text" id="myInput" placeholder="Write task here...">
            <button onclick="newItem()">Add</button>
        </div>

        <div class="list-container">
            <h2>Tasks (<span id="counter">0</span>)</h2>
            <ul id="myUL">
                </ul>
            <p id="noTasks">No tasks yet.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
